name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run memory system tests
        run: |
          python test/test_memory_system.py
      
      - name: Run self evolver tests
        run: |
          python test/test_self_evolover.py
      
      - name: Run all component tests
        run: |
          python test/test_all_components.py

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install lint tools
        run: pip install flake8 black
      
      - name: Check formatting
        run: |
          black --check --diff .
      
      - name: Run flake8
        run: |
          flake8 . --max-line-length=120 --ignore=E501,W503

  type-check:
    runs-on: ubuntu-latest
    if: false  # Disabled until mypy config is ready
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install mypy
        run: pip install mypy
      
      - name: Type check
        run: |
          mypy juhuo --ignore-missing-imports
