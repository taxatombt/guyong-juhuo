version: '3.8'

services:
  juhuo:
    build: .
    container_name: juhuo
    ports:
      - "18768:18768"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-minimax}
      - LLM_MAX_CONCURRENT=${LLM_MAX_CONCURRENT:-10}
      - LLM_MAX_QPM=${LLM_MAX_QPM:-600}
    volumes:
      - juhuo-data:/root/.juhuo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "juhuo", "test"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  juhuo-data:
